name: Generate & Deploy Event Pages

on:
  schedule:
    # 10分ごと に実行
    - cron: '*/10 * * * *'
  # 手動実行も可能にしておく
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests zoneinfo

      - name: Generate HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python generate.py

      # 生成した docs/events.html を コミット
      - name: Deploy to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mispla/events/docs/events.html
          # 差分がなければスキップ
          if git diff --cached --quiet; then
            echo "変更なし。デプロイをスキップします。"
          else
            git commit -m "chore: update event pages [skip ci]"
            git push
          fi
