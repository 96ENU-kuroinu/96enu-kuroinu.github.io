<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../css/ad-view.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アプリへ移動中...</title>
    <link rel="shortcut icon" type="image/x-icon" href="../imgs/td/favicon.ico">
    <script>
        window.onload = function () {
            const url = new URL(window.location.href);
            const userAgent = navigator.userAgent.toLowerCase() || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(userAgent);
            const isIOS = /ipad|macintosh|iphone|ipod/.test(userAgent) && !window.MSStream;

            const androidStore = "https://play.google.com/store/apps/details?id=com.falhongcha.tidy_drive&hl=ja";
            const iosStore = "https://apps.apple.com/jp/app/tidydrive/id6757675729";

            // 無限ループ防止用のフラグをチェック
            if (url.searchParams.get('redirected') === 'true') {
                // すでに一度アプリ起動を試みてここに戻ってきた＝アプリがない
                window.location.href = isAndroid ? androidStore : iosStore;
                return;
            }

            if (isAndroid || isIOS) {
                // 次回このページに来た時に「ストア行き」にするためのフラグを付けてリダイレクト
                url.searchParams.set('redirected', 'true');
                const appUrl = url.toString();

                // アプリ起動を試みる
                window.location.href = appUrl;

                // アプリが起動しなかった場合、1.5秒後に自らリロード（フラグ付きなので次はストアへ）
                setTimeout(function () {
                    window.location.href = appUrl;
                }, 1500);
            } else {
                // PCの場合はトップへ
                window.location.href = "https://96enu-kuroinu.github.io/td/td-top.html";
            }
        };
    </script>
</head>

<body>
    <header style="background-color: #95cf4a;padding: 10px;">
        <p id="lastUpdated"></p>
    </header>

    <p>アプリを起動しています...<br>切り替わらない場合は<a
            href="https://play.google.com/store/apps/details?id=com.falhongcha.tidy_drive&hl=ja">こちら</a>。</p>

    <div id="ad-banner" style="text-align: center;">
        <div class="ad-pc">
            <script src="https://adm.shinobi.jp/s/d803ce14cb8127f899862ee566509aa8"></script>
        </div>

        <div class="ad-sp">
            <script src="https://adm.shinobi.jp/s/86618523177f2c4a1819c7d5733ac04c"></script>
        </div>
    </div>

    <footer>
        <div id="footer"></div>
    </footer>

    <script src="../js/load-footer.js"></script>
    <script src="../js/load-last-update-date.js"></script>
</body>

</html>
